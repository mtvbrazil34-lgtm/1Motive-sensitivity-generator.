<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneMotive Sensi Generator</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    select, button { font-weight: bold; padding: 5px; margin: 5px 0; }
    h2, h3 { color: black; font-weight: bold; }
    #pcSection { display: none; margin-top: 10px; }
</style>
</head>
<body>

<h2>1._MOTIVE Sensitivity Generator</h2>

<label for="type">Select Device Type:</label><br>
<select id="type">
  <option value="iphone">iPhone</option>
  <option value="samsung">Samsung</option>
  <option value="redmi">Redmi</option>
  <option value="tecno">Tecno</option>
  <option value="oppo">Oppo</option>
  <option value="pixel">Google Pixel</option>
  <option value="tablet">Tablet / iPad</option>
  <option value="pc">PC (Emulator)</option>
</select>

<br>

<label for="playstyle">Select Play Style:</label><br>
<select id="playstyle">
  <option value="freestyle">Freestyle Player</option>
  <option value="onetap">One-Tap Player</option>
  <option value="ranked">Ranked Player</option>
  <option value="sniper">Sniper Player</option>
  <option value="guild">Guild War Player</option>
</select>

<br>

<label for="pref">Sensitivity Preference:</label><br>
<select id="pref">
  <option value="low">Low Sensitivity</option>
  <option value="mid">Balanced</option>
  <option value="high">High Sensitivity</option>
</select>

<br><br>
<button onclick="generate()">Generate Sensitivity</button>

<h3>Results:</h3>
<p id="extraResult"></p>
<p id="generalResult"></p>
<p id="redDotResult"></p>
<p id="twoXResult"></p>
<p id="fourXResult"></p>
<p id="fireResult"></p>

<div id="pcSection">
  <h3>PC Tweaks:</h3>
  <p id="pcTweaks"></p>
</div>

<script src="script.js"></script>

</body>
</html>
